        <h1>配列の入口</h1>
        <p class="lead">配列の長さ、添字、デフォルト値を理解する。</p>
        <h2>添字は0から始まる</h2><pre><code>int[] nums = new int[3];
System.out.println(nums[0]); // 0</code></pre><p>int配列のデフォルト値は0です。参照型配列ならnullです。</p><h2>範囲外アクセス</h2><p>コンパイルは通っても、範囲外アクセスは実行時に ArrayIndexOutOfBoundsException です。</p>
