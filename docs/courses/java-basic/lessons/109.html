<div class="nav"><a href="../../index.html">トップ</a><a href="../index.html">コース</a><a href="../../../articles/index.html">学習記事</a></div><article class="card article-page"><h1>Lesson 109 小さく動かして確認する</h1><p class="lead">長いコードを一気に書くより、少し書いて動かす方が早く正確です。</p><h2>進め方</h2><ol><li>変数を1つ作る</li><li>表示して確認する</li><li>条件を追加する</li><li>ループを追加する</li></ol><h2>例</h2><pre><code>System.out.println(&quot;debug: &quot; + value);</code></pre><h2>注意</h2><p>確認用の出力は後で消します。学習中は挙動を理解するために積極的に使って構いません。</p></article>
