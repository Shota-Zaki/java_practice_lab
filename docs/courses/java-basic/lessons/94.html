<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Lesson 94 テストしながら学ぶ習慣</title><link rel='stylesheet' href='../../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../../index.html'>トップ</a><a href='../../../courses/java-basic/index.html'>Java基礎</a><a href='../../../articles/index.html'>学習記事</a></div><article class='card'><h1>Lesson 94 テストしながら学ぶ習慣</h1><p class='lead'>Javaは小さいコードを動かして確認すると理解が速くなります。</p><div class='toc'><a href='#s1'>1ファイルで試す</a><a href='#s2'>出力で確認する</a><a href='#s3'>注意</a></div><h2 id='s1'>1ファイルで試す</h2><p>最初は小さい<code>Sample.java</code>を作り、1つの論点だけ確認するのが効率的です。</p><h2 id='s2'>出力で確認する</h2><pre><code>System.out.println("x=" + x);</code></pre><p>変数の変化やメソッドの呼び出し順を可視化できます。</p><h2 id='s3'>注意</h2><p>試験ではIDEの補完が使えません。最終的にはコードを読んで判断できる状態にする必要があります。</p><div class='nav'><a href='93.html'>前へ</a><a href='../index.html'>一覧へ</a><a href='95.html'>次へ</a></div></article></main></body></html>
