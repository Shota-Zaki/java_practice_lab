<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Lesson 84 配列を「箱の集まり」として読む</title><link rel='stylesheet' href='../../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../../index.html'>トップ</a><a href='../../../courses/java-basic/index.html'>Java基礎</a><a href='../../../articles/index.html'>学習記事</a></div><article class='card'><h1>Lesson 84 配列を「箱の集まり」として読む</h1><p class='lead'>配列問題は、長さ・添字・初期値・参照共有の4点を見ます。</p><div class='toc'><a href='#s1'>長さと添字</a><a href='#s2'>初期値</a><a href='#s3'>参照共有</a></div><h2 id='s1'>長さと添字</h2><p>配列の添字は0から始まります。長さが3なら有効な添字は0,1,2です。</p><pre><code>int[] a = new int[3];
a[3] = 10; // 実行時例外</code></pre><h2 id='s2'>初期値</h2><table><tr><th>型</th><th>初期値</th></tr><tr><td>int</td><td>0</td></tr><tr><td>boolean</td><td>false</td></tr><tr><td>参照型</td><td>null</td></tr></table><h2 id='s3'>参照共有</h2><pre><code>int[] a = {1,2};
int[] b = a;
b[0] = 9;
System.out.println(a[0]); // 9</code></pre><div class='nav'><a href='83.html'>前へ</a><a href='../index.html'>一覧へ</a><a href='85.html'>次へ</a></div></article></main></body></html>
