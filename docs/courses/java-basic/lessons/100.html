<div class="nav"><a href="../../index.html">トップ</a><a href="../index.html">コース</a><a href="../../../articles/index.html">学習記事</a></div><article class="card article-page"><h1>Lesson 100 繰り返し処理の出口</h1><p class="lead">ループは開始値・継続条件・更新処理・出口を確認します。</p><h2>基本形</h2><pre><code>for (int i = 0; i &lt; 5; i++) {
    System.out.println(i);
}</code></pre><h2>確認点</h2><ul><li>iは0から始まる</li><li>iが5未満の間だけ続く</li><li>最後にi++される</li></ul><h2>注意</h2><p><code>&lt;=</code> にすると1回多く回る可能性があります。配列では範囲外アクセスの原因です。</p></article>
