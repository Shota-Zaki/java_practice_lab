<div class="nav"><a href="../../index.html">トップ</a><a href="../index.html">コース</a><a href="../../../articles/index.html">学習記事</a></div><article class="card article-page"><h1>Lesson 98 出力を分けて考える</h1><p class="lead">画面に表示する処理と、値を計算する処理は分けると読みやすくなります。</p><h2>悪い例</h2><pre><code>System.out.println(price * count + &quot;円&quot;);</code></pre><h2>分けた例</h2><pre><code>int total = price * count;
System.out.println(total + &quot;円&quot;);</code></pre><h2>理由</h2><p>計算の確認、出力形式の変更、バグ調査がしやすくなります。</p></article>
