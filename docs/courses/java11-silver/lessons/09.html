<div class="nav"><a href="../../index.html">トップ</a><a href="../index.html">コース</a><a href="../../../articles/index.html">学習記事</a></div><article class="card article-page"><h1>Java11 Silverのvar</h1><p class="lead">Java11 Silverではローカル変数型推論varの制約が重要です。</p><h2>使える場所</h2><p>ローカル変数で初期化式がある場合に使えます。</p><pre><code>var name = &quot;Java&quot;;</code></pre><h2>使えない場所</h2><p>フィールド、メソッド引数、戻り値型には使えません。</p><pre><code>class A {
    var x = 10; // コンパイルエラー
}</code></pre></article>
