<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>switch文・switch式・yieldの見分け方</title><link rel='stylesheet' href='../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../index.html'>トップ</a><a href='../../courses/java-basic/index.html'>Java基礎</a><a href='../../articles/index.html'>学習記事</a></div><article class='card'><h1>switch文・switch式・yieldの見分け方</h1><p class="lead">試験対策と実装理解の両方で使えるよう、例を中心に整理します。</p><h2>switch文</h2><pre><code>switch(x){ case 1: result="A"; break; }</code></pre><p>文なので値を返しません。</p><h2>switch式</h2><pre><code>String s = switch(x){ case 1 -&gt; "A"; default -&gt; "B"; };</code></pre><p>式なので値を返します。</p><h2>yield</h2><pre><code>String s = switch(x){ case 1: yield "A"; default: yield "B"; };</code></pre><div class='nav'><a href='../index.html'>記事一覧へ</a></div></article></main></body></html>
