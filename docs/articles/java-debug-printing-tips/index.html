<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Javaのデバッグ出力で確認するポイント</title><link rel='stylesheet' href='../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../index.html'>トップ</a><a href='../../courses/java-basic/index.html'>Java基礎</a><a href='../../articles/index.html'>学習記事</a></div><article class='card'><h1>Javaのデバッグ出力で確認するポイント</h1><p class="lead">試験対策と実装理解の両方で使えるよう、例を中心に整理します。</p><h2>目的</h2>デバッグ出力は、値・型・処理順を確認するために使います。<h2>値を見る</h2><pre><code>System.out.println("x=" + x);</code></pre><h2>処理順を見る</h2><pre><code>System.out.println("before method");
method();
System.out.println("after method");</code></pre><p>コンストラクタやfinallyの順序確認に有効です。</p><div class='nav'><a href='../index.html'>記事一覧へ</a></div></article></main></body></html>
