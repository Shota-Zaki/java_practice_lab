<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Java Goldに入る前のOptional入門</title><link rel='stylesheet' href='../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../index.html'>トップ</a><a href='../../courses/java-basic/index.html'>Java基礎</a><a href='../../articles/index.html'>学習記事</a></div><article class='card'><h1>Java Goldに入る前のOptional入門</h1><p class="lead">試験対策と実装理解の両方で使えるよう、例を中心に整理します。</p><h2>目的</h2><code>Optional</code>は「値があるかもしれないし、ないかもしれない」を表現する型です。<h2>基本</h2><pre><code>Optional&lt;String&gt; o = Optional.of("A");
o.ifPresent(System.out::println);</code></pre><h2>注意</h2><p><code>Optional.get()</code>を無条件に呼ぶ使い方は避けます。値がなければ例外になります。</p><div class='nav'><a href='../index.html'>記事一覧へ</a></div></article></main></body></html>
