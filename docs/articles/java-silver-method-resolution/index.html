<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Java Silverのメソッド呼び出し解決まとめ</title><link rel='stylesheet' href='../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../index.html'>トップ</a><a href='../../courses/java-basic/index.html'>Java基礎</a><a href='../../articles/index.html'>学習記事</a></div><article class='card'><h1>Java Silverのメソッド呼び出し解決まとめ</h1><p class="lead">試験対策と実装理解の両方で使えるよう、例を中心に整理します。</p><h2>結論</h2>オーバーロードはコンパイル時、オーバーライドは実行時の実体で決まります。<h2>オーバーロード</h2><pre><code>void test(Object o) {}
