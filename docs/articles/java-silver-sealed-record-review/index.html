<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>sealedとrecordのJava17 Silver頻出整理</title><link rel='stylesheet' href='../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../index.html'>トップ</a><a href='../../courses/java-basic/index.html'>Java基礎</a><a href='../../articles/index.html'>学習記事</a></div><article class='card'><h1>sealedとrecordのJava17 Silver頻出整理</h1><p class="lead">試験対策と実装理解の両方で使えるよう、例を中心に整理します。</p><h2>sealed</h2><p><code>sealed</code>は継承できるクラスを制限します。直接のサブクラスは<code>final</code>、<code>sealed</code>、<code>non-sealed</code>のいずれかを指定します。</p><h2>record</h2><p>recordはデータ保持用の簡潔なクラスです。アクセサは<code>name()</code>のようにコンポーネント名になります。</p><h2>注意</h2><p>recordのフィールドへ直接再代入したり、存在しないgetter名を呼ぶ問題に注意します。</p><div class='nav'><a href='../index.html'>記事一覧へ</a></div></article></main></body></html>
