<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Silver合格後に何を学ぶべきか</title><link rel='stylesheet' href='../../assets/content.css'></head><body><main class='wrap'><div class='nav'><a href='../../index.html'>トップ</a><a href='../../courses/java-basic/index.html'>Java基礎</a><a href='../../articles/index.html'>学習記事</a></div><article class='card'><h1>Silver合格後に何を学ぶべきか</h1><p class="lead">試験対策と実装理解の両方で使えるよう、例を中心に整理します。</p><h2>結論</h2>Silver後は、実務寄りに進むか、Goldで言語機能を深めるかを分けるべきです。<h2>実務寄り</h2><p>Git、SQL、HTTP、Spring Boot、テスト、ログ、例外設計を学ぶと実務に近づきます。</p><h2>Gold寄り</h2><p>ラムダ、Stream、ジェネリクス、I/O、並行処理、モジュールを深めます。</p><div class='nav'><a href='../index.html'>記事一覧へ</a></div></article></main></body></html>
